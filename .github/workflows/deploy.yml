name: Test and Deploy

on:
  push:
    branches:
      - main
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Tests
        run: pytest tests/

  deploy:
    if: github.ref == 'refs/heads/main'  # Deploys ONLY if on main branch
    needs: test  # Ensures deployment runs only if tests pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
          platforms: linux/amd64,linux/arm64

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/telegram-bot
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
            docker stop telegram-bot || true
            docker rm telegram-bot || true
            docker run -d --restart always --name telegram-bot \
              -e TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
              -e FOOTBALL_API_KEY=${{ secrets.FOOTBALL_API_KEY }} \
              -v ~/telegram-bot/db.sqlite3:/app/db.sqlite3 \
              ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
