name: Test and Deploy

on:
  push:
    branches:
      - main
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest tests/

  deploy:
    if: github.ref == 'refs/heads/main'  # Deploys ONLY if on main branch
    needs: test  # Ensures deployment runs only if tests pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/telegram-bot
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
            docker stop telegram-bot || true
            docker rm telegram-bot || true
            docker run -d --restart always --name telegram-bot \
              -e TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
              -e FOOTBALL_API_KEY=${{ secrets.FOOTBALL_API_KEY }} \
              -v ~/telegram-bot/db.sqlite3:/app/db.sqlite3 \
              ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
