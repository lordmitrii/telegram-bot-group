name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main  # Runs the workflow when code is pushed to 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Log in to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Step 3: Build and push Docker image
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest

      # Step 4: Deploy to DigitalOcean via SSH
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
            docker stop telegram-bot || true
            docker rm telegram-bot || true
            docker run -d --restart always --name telegram-bot -e TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} ${{ secrets.DOCKERHUB_USERNAME }}/telegram-bot:latest
